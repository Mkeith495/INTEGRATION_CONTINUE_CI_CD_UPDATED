name: CD

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    delivery:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: package-lock.json

            - run: npm ci
            - run: npm run lint
            - run: npm run build
            - run: npm run test:unit

            - uses: actions/upload-artifact@v4
              with:
                  name: shopshop-api-${{ github.ref_name }}
                  path: build
